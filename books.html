<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books Management</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
color:#1565c0;
}

.form{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#1565c0;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.book-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.book{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.book img{
width:120px;
height:170px;
object-fit:cover;
border-radius:5px;
}

.book h3{
margin:10px 0;
}

.book p{
margin-bottom:10px;
}

.delete{
background:red;
}

.delete:hover{
background:darkred;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 Books Management</h1>

<div class="form">

<input type="text" id="title" placeholder="Book Title">

<input type="text" id="author" placeholder="Author Name">

<input type="text" id="image" placeholder="Book Cover Image URL">

<button onclick="addBook()">Add Book</button>

</div>

<div class="book-list" id="bookList"></div>

</div>

<script>

let books=JSON.parse(localStorage.getItem("books"))||[];

function saveBooks(){
localStorage.setItem("books",JSON.stringify(books));
}

function displayBooks(){

let list=document.getElementById("bookList");

list.innerHTML="";

books.forEach((book,index)=>{

list.innerHTML+=`
<div class="book">

<img src="${book.image}" onerror="this.src='https://via.placeholder.com/120x170?text=Book'">

<h3>${book.title}</h3>

<p><b>Author:</b> ${book.author}</p>

<button class="delete" onclick="deleteBook(${index})">
Delete
</button>

</div>
`;

});

}

function addBook(){

let title=document.getElementById("title").value;
let author=document.getElementById("author").value;
let image=document.getElementById("image").value;

if(title==""||author==""){
alert("Fill all details");
return;
}

books.push({
title,
author,
image
});

saveBooks();

displayBooks();

document.getElementById("title").value="";
document.getElementById("author").value="";
document.getElementById("image").value="";

}

function deleteBook(index){

books.splice(index,1);

saveBooks();

displayBooks();

}

displayBooks();

</script>

</body>
</html>
