<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management System - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.container{
    width:900px;
    max-width:95%;
    background:#fff;
    display:flex;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.left{
    flex:1;
    background:#1565c0;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
    text-align:center;
}

.left h1{
    font-size:34px;
    margin-bottom:15px;
}

.left p{
    font-size:18px;
}

.right{
    flex:1;
    padding:40px;
    display:flex;
    justify-content:center;
    align-items:center;
}

form{
    width:100%;
}

form h2{
    text-align:center;
    margin-bottom:25px;
    color:#1565c0;
}

.input-box{
    display:flex;
    align-items:center;
    border:1px solid #ccc;
    border-radius:8px;
    padding:12px;
    margin-bottom:20px;
}

.input-box i{
    color:#1565c0;
    margin-right:10px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#1565c0;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0d47a1;
}

#message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

@media(max-width:768px){

.container{
    flex-direction:column;
}

.left{
    padding:30px;
}

.left h1{
    font-size:28px;
}

.right{
    padding:30px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="left">
<h1>📚 Library Management System</h1>
<p>Manage Books, Students, Issue & Return Easily.</p>
</div>

<div class="right">

<form id="loginForm">

<h2>Login</h2>

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="username" placeholder="Username" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

<p id="message"></p>

</form>

</div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let message = document.getElementById("message");

    if(username !== "" && password !== ""){

        message.style.color = "green";
        message.innerHTML = "✅ Login Successful! Redirecting...";

        setTimeout(function(){
            window.location.href = "dashboard.html";
        },1000);

    }else{

        message.style.color = "red";
        message.innerHTML = "❌ Please enter Username and Password.";

    }

});
</script>

</body>
</html>
